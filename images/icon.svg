<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA3F5"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Document -->
  <g filter="url(#shadow)">
    <path d="M16 10 L16 118 Q16 122 20 122 L78 122 Q82 122 82 118 L82 34 L58 10 L20 10 Q16 10 16 14 Z" fill="url(#docGrad)"/>
    <path d="M58 10 L58 30 Q58 34 62 34 L82 34 Z" fill="#2E6BC4" opacity="0.6"/>
  </g>

  <!-- Document lines -->
  <rect x="28" y="48" width="42" height="4" rx="2" fill="white" opacity="0.5"/>
  <rect x="28" y="60" width="42" height="4" rx="2" fill="white" opacity="0.5"/>
  <rect x="28" y="72" width="30" height="4" rx="2" fill="white" opacity="0.5"/>

  <!-- Arrow shaft: 45-degree line, endpoint at arrowhead base center -->
  <line x1="64" y1="78" x2="108" y2="34" stroke="url(#arrowGrad)" stroke-width="9" stroke-linecap="round"/>

  <!-- Arrow head: triangle centered on shaft endpoint (108,34), pointing 45-deg upper-right -->
  <!-- Direction: (0.707, -0.707), Perp: (0.707, 0.707) -->
  <!-- Tip = E + 16*d = (119, 23) -->
  <!-- Left = E + 8*n = (114, 40) -->
  <!-- Right = E - 8*n = (102, 28) -->
  <polygon points="119,23 114,40 102,28" fill="url(#arrowGrad)"/>

  <!-- Arrow inner highlight -->
  <line x1="64" y1="78" x2="106" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
</svg>
